<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller Agenda IA</title>
    <style>
        :root {
            --main: #1a73e8;
            --bot: #f1f3f4;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 550px;
            height: 96vh;
            display: flex;
            flex-direction: column;
        }

        #chatWindow {
            flex-grow: 1;
            background: white;
            border-radius: 25px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #eee;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .user {
            align-self: flex-end;
            background: var(--main);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot {
            align-self: flex-start;
            background: var(--bot);
            color: #1a1f23;
            border-bottom-left-radius: 5px;
            border: 1px solid #e8e8e8;
        }

        .input-area {
            display: flex;
            gap: 12px;
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        input {
            flex-grow: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }

        button {
            background: var(--main);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .search-area {
            margin-top: 15px;
            background: white;
            padding: 18px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }

        td {
            padding: 10px 0;
            border-bottom: 1px solid #f4f4f4;
            color: #444;
        }

        .del-btn {
            color: #ea4335;
            cursor: pointer;
            font-weight: bold;
            border: none;
            background: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="chatWindow">
            <div class="msg bot">¡Hola! Soy tu asistente del taller. Puedo darte cita para hoy o para las próximas
                semanas. ¿Qué necesitas?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Escribe aquí tu mensaje..."
                onkeypress="if(event.key==='Enter') enviarChat()">
            <button id="btnSend" onclick="enviarChat()">Enviar</button>
        </div>
        <div class="search-area">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchId" style="border: 1px solid #ddd; border-radius: 12px; padding: 10px;"
                    placeholder="Tu Nombre para buscar">
                <button style="background: #34a853; width: auto;" onclick="listarPrivado()">Ver Mis Citas</button>
            </div>
            <table id="miAgenda"></table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5oekJtP0IYtjHyfiXYSLRS9onSLs9EJes_j-82lnuEpSiw45_OVh7wpkbuFpo17OPMA/exec";
        let chatHistory = [];

        async function enviarChat() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatWindow');
            const btn = document.getElementById('btnSend');
            const msg = input.value.trim();
            if (!msg) return;

            chat.innerHTML += `<div class="msg user">${msg}</div>`;
            input.value = ""; btn.disabled = true;
            chat.scrollTop = chat.scrollHeight;
            chatHistory.push({ role: "user", parts: [{ text: msg }] });

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "RESERVAR", history: chatHistory }) });
                const data = await res.json();
                const botMsg = data.botResponse || "Dime algo más de información, por favor.";
                chat.innerHTML += `<div class="msg bot">${botMsg}</div>`;
                chatHistory.push({ role: "model", parts: [{ text: botMsg }] });
                chat.scrollTop = chat.scrollHeight;
                if (data.success) listarPrivado();
            } catch (e) {
                chat.innerHTML += `<div class="msg bot" style="color:red">He tenido un problema al conectar. ¿Podrías repetir?</div>`;
            } finally { btn.disabled = false; }
        }

        async function listarPrivado() {
            const id = document.getElementById('searchId').value;
            const tabla = document.getElementById('miAgenda');
            if (!id) return;
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "LISTAR", searchId: id }) });
                const data = await res.json();
                tabla.innerHTML = data.length === 0 ? "<tr><td>No tienes citas próximas registradas.</td></tr>" :
                    data.map(f => `<tr><td><b>${f[0]}</b> a las ${f[1]} (${f[4]})</td><td><button class="del-btn" onclick="eliminar('${f[5]}')">✕</button></td></tr>`).join('');
            } catch (e) { console.error(e); }
        }

        async function eliminar(id) {
            if (!confirm("¿Seguro que quieres cancelar la cita?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "ELIMINAR", id: id }) });
            listarPrivado();
        }
    </script>
</body>

</html>
