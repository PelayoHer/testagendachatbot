<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Inteligente</title>
    <style>
        :root {
            --primary: #0066ff;
            --bot-bg: #f0f2f5;
            --bg: #e4e7eb;
            --text: #1a1a1a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Chat Box */
        .chat-card {
            flex-grow: 1;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: white;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            color: var(--text);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 80%;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
            white-space: pre-line;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-radius: 20px 20px 4px 20px;
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bg);
            color: var(--text);
            border-radius: 20px 20px 20px 4px;
        }

        /* Input Area */
        .input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="text"] {
            flex-grow: 1;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 12px 20px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading Dots */
        .typing {
            display: none;
            align-self: flex-start;
            background: var(--bot-bg);
            padding: 12px 18px;
            border-radius: 20px 20px 20px 4px;
            color: #888;
            font-style: italic;
            font-size: 14px;
        }

        /* Search Section */
        .search-card {
            background: white;
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        .search-flex {
            display: flex;
            gap: 10px;
        }

        .btn-green {
            background: #10b981;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .del-btn {
            color: #ef4444;
            font-weight: bold;
            border: none;
            background: none;
            cursor: pointer;
            float: right;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="chat-card">
            <div class="chat-header">✨ Asistente de Reservas</div>
            <div class="chat-messages" id="chatWindow">
                <div class="bubble bot">¡Hola! Estoy aquí para gestionar tu agenda. Puedes pedirme una cita o consultar
                    tus reservas actuales.</div>
                <div id="typingIndicator" class="typing">Escribiendo...</div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Escribe tu mensaje..."
                    onkeypress="if(event.key==='Enter') enviarChat()">
                <button id="btnSend" onclick="enviarChat()">Enviar</button>
            </div>
        </div>

        <div class="search-card">
            <div class="search-flex">
                <input type="text" id="searchId" placeholder="Nombre para gestionar citas">
                <button class="btn-green" onclick="listarPrivado()">Ver Agenda</button>
            </div>
            <table id="miAgenda"></table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5oekJtP0IYtjHyfiXYSLRS9onSLs9EJes_j-82lnuEpSiw45_OVh7wpkbuFpo17OPMA/exec";
        let chatHistory = [];

        async function enviarChat() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatWindow');
            const btn = document.getElementById('btnSend');
            const typing = document.getElementById('typingIndicator');
            const msg = input.value.trim();

            if (!msg) return;

            // Mostrar mensaje usuario
            const userMsg = document.createElement('div');
            userMsg.className = 'bubble user';
            userMsg.innerText = msg;
            chat.insertBefore(userMsg, typing);

            input.value = "";
            btn.disabled = true;
            chat.scrollTop = chat.scrollHeight;

            // Añadir a memoria
            chatHistory.push({ role: "user", text: msg });

            // Mostrar "Escribiendo..."
            typing.style.display = "block";
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "CHAT", history: chatHistory })
                });
                const data = await res.json();

                typing.style.display = "none";

                const botMsgText = data.botResponse || "No te he entendido, ¿puedes repetirlo?";

                const botMsgNode = document.createElement('div');
                botMsgNode.className = 'bubble bot';
                botMsgNode.innerText = botMsgText;
                chat.insertBefore(botMsgNode, typing);

                chatHistory.push({ role: "model", text: botMsgText });
                chat.scrollTop = chat.scrollHeight;

                if (data.success && botMsgText.includes("confirmada")) listarPrivado();

            } catch (e) {
                typing.style.display = "none";
                const errorNode = document.createElement('div');
                errorNode.className = 'bubble bot';
                errorNode.style.color = "red";
                errorNode.innerText = "Error de conexión. Por favor, reintenta.";
                chat.insertBefore(errorNode, typing);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        async function listarPrivado() {
            const id = document.getElementById('searchId').value;
            const tabla = document.getElementById('miAgenda');
            if (!id) return;
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "LISTAR", searchId: id }) });
                const data = await res.json();
                tabla.innerHTML = data.length === 0 ? "<tr><td style='text-align:center; color:#888;'>No tienes citas agendadas.</td></tr>" :
                    data.map(f => `<tr><td><b>${f[0]}</b> a las ${f[1]}</td><td><button class="del-btn" onclick="eliminar('${f[5]}')">Cancelar</button></td></tr>`).join('');
            } catch (e) { console.error(e); }
        }

        async function eliminar(id) {
            if (!confirm("¿Cancelar reserva de forma permanente?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "ELIMINAR", id: id }) });
            listarPrivado();
        }
    </script>
</body>

</html>
