<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agenda IA</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #chat {
            width: 100%;
            max-width: 450px;
            height: 400px;
            background: white;
            border-radius: 15px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .msg {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 14px;
        }

        .u {
            align-self: flex-end;
            background: #1a73e8;
            color: white;
        }

        .b {
            align-self: flex-start;
            background: #e8f0fe;
            color: #333;
        }

        .box {
            width: 100%;
            max-width: 450px;
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        input {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
        }

        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        #agenda {
            margin-top: 20px;
            font-size: 12px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            width: 100%;
            max-width: 450px;
        }
    </style>
</head>

<body>
    <h3>🤖 Asistente Virtual</h3>
    <div id="chat">
        <div class="msg b">¡Hola! ¿Qué día y hora quieres tu cita?</div>
    </div>
    <div class="box">
        <input type="text" id="in" placeholder="Escribe aquí...">
        <button id="btn" onclick="talk()">Enviar</button>
    </div>
    <div class="box">
        <input type="text" id="sid" placeholder="Tu Nombre para ver citas">
        <button onclick="list()" style="background:#34a853">Ver Agenda</button>
    </div>
    <div id="agenda"></div>

    <script>
        const URL = "TU_URL_DE_APPS_SCRIPT";
        let hist = [];

        async function talk() {
            const i = document.getElementById('in');
            const c = document.getElementById('chat');
            if (!i.value) return;

            c.innerHTML += `<div class="msg u">${i.value}</div>`;
            hist.push({ role: "user", parts: [{ text: i.value }] });
            const msg = i.value; i.value = ""; c.scrollTop = c.scrollHeight;

            const res = await fetch(URL, { method: 'POST', body: JSON.stringify({ action: "RESERVAR", history: hist }) });
            const data = await res.json();

            c.innerHTML += `<div class="msg b">${data.botResponse}</div>`;
            hist.push({ role: "model", parts: [{ text: data.botResponse }] });
            c.scrollTop = c.scrollHeight;
        }

        async function list() {
            const id = document.getElementById('sid').value;
            const res = await fetch(URL, { method: 'POST', body: JSON.stringify({ action: "LISTAR", searchId: id }) });
            const data = await res.json();
            document.getElementById('agenda').innerHTML = data.map(f => `<p>📅 <b>${f[0]}</b> - ${f[1]}</p>`).join('') || "Sin citas.";
        }
    </script>
</body>

</html>
