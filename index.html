<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Tienda Inteligente</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bot-bg: #f3f4f6;
            --user-bg: #6366f1;
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --text-dark: #1f2937;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%;
        }

        /* Chat Interface */
        .chat-container {
            flex-grow: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: white;
            padding: 20px;
            text-align: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-dark);
            border-bottom: 1px solid #e5e7eb;
        }

        .chat-body {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .bubble {
            max-width: 82%;
            padding: 14px 18px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-line;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user {
            align-self: flex-end;
            background: var(--user-bg);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2);
        }

        .bot {
            align-self: flex-start;
            background: var(--bot-bg);
            color: var(--text-dark);
            border-radius: 20px 20px 20px 4px;
            border: 1px solid #e5e7eb;
        }

        .error-bubble {
            align-self: flex-start;
            background: #FEE2E2;
            color: #B91C1C;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid #FCA5A5;
        }

        /* Input Area */
        .input-box {
            padding: 16px;
            background: white;
            border-top: 1px solid #E5E7EB;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex-grow: 1;
            border: 2px solid #f3f4f6;
            background: #f9fafb;
            border-radius: 20px;
            padding: 12px 20px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            background: white;
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-send:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .typing {
            display: none;
            align-self: flex-start;
            color: #9ca3af;
            font-style: italic;
            font-size: 13px;
            padding: 0 10px;
        }

        /* Agenda Panel */
        .agenda-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .agenda-controls {
            display: flex;
            gap: 10px;
        }

        .btn-agenda {
            background: #10b981;
            color: white;
            border: none;
            border-radius: 16px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-agenda:hover {
            background: #059669;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }

        td {
            padding: 12px 4px;
            border-bottom: 1px solid #f3f4f6;
            color: var(--text-dark);
        }

        .btn-del {
            color: #ef4444;
            font-weight: bold;
            border: none;
            background: none;
            cursor: pointer;
            float: right;
            padding: 5px;
        }
    </style>
</head>

<body>

    <div class="app-wrapper">
        <div class="chat-container">
            <div class="header">🛍️ Asistente de Tienda</div>
            <div class="chat-body" id="chatWindow">
                <div class="bubble bot">¡Hola! Soy el asistente virtual de la tienda. ¿Quieres que te agende una cita o
                    necesitas consultar tus reservas?</div>
                <div id="typingIndicator" class="typing">Analizando...</div>
            </div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Escribe tu mensaje..."
                    onkeypress="if(event.key==='Enter') enviarChat()">
                <button class="btn-send" id="btnSend" onclick="enviarChat()">Enviar</button>
            </div>
        </div>

        <div class="agenda-panel">
            <div class="agenda-controls">
                <input type="text" id="searchId" placeholder="Dime tu nombre para buscar...">
                <button class="btn-agenda" onclick="listarPrivado()">Ver Citas</button>
            </div>
            <table id="miAgenda"></table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5oekJtP0IYtjHyfiXYSLRS9onSLs9EJes_j-82lnuEpSiw45_OVh7wpkbuFpo17OPMA/exec"; // <-- ACUÉRDATE DE PEGAR LA NUEVA URL AQUÍ
        let chatHistory = [];

        async function enviarChat() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chatWindow');
            const btn = document.getElementById('btnSend');
            const typing = document.getElementById('typingIndicator');
            const msg = input.value.trim();

            if (!msg) return;

            // Añadir mensaje del usuario
            const userMsg = document.createElement('div');
            userMsg.className = 'bubble user';
            userMsg.innerText = msg;
            chat.insertBefore(userMsg, typing);

            input.value = "";
            btn.disabled = true;
            chat.scrollTop = chat.scrollHeight;

            chatHistory.push({ role: "user", text: msg });

            typing.style.display = "block";
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "CHAT", history: chatHistory })
                });
                const data = await res.json();

                typing.style.display = "none";

                const botMsgNode = document.createElement('div');

                // Mostrar errores en rojo
                if (!data.success && data.botResponse.includes("Error técnico")) {
                    botMsgNode.className = 'bubble error-bubble';
                } else {
                    botMsgNode.className = 'bubble bot';
                }

                botMsgNode.innerText = data.botResponse;
                chat.insertBefore(botMsgNode, typing);

                chatHistory.push({ role: "model", text: data.botResponse });
                chat.scrollTop = chat.scrollHeight;

                if (data.success && data.botResponse.includes("confirmada")) listarPrivado();

            } catch (e) {
                typing.style.display = "none";
                const errNode = document.createElement('div');
                errNode.className = 'bubble error-bubble';
                errNode.innerText = "Error de conexión. Revisa tu internet e inténtalo de nuevo.";
                chat.insertBefore(errNode, typing);
                chat.scrollTop = chat.scrollHeight;
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }

        async function listarPrivado() {
            const id = document.getElementById('searchId').value;
            const tabla = document.getElementById('miAgenda');
            if (!id) return;
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "LISTAR", searchId: id }) });
                const data = await res.json();
                tabla.innerHTML = data.length === 0 ? "<tr><td style='text-align:center; color:#6B7280;'>No tienes citas agendadas.</td></tr>" :
                    data.map(f => `<tr><td><b>${f[0]}</b> a las ${f[1]}</td><td><button class="btn-del" onclick="eliminar('${f[5]}')">✕ Anular</button></td></tr>`).join('');
            } catch (e) { console.error(e); }
        }

        async function eliminar(id) {
            if (!confirm("¿Cancelar tu reserva de la tienda de forma permanente?")) return;
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: "ELIMINAR", id: id }) });
            listarPrivado();
        }
    </script>
</body>

</html>
